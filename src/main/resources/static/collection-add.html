<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HoopAround | Add Match</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/css/main.css" />
    <style>
        .sidebar { position: fixed; top: 0; left: 0; transform: translateX(-102%); }
        .sidebar-overlay { opacity: 0; pointer-events: none; }
        body.menu-open .sidebar { transform: translateX(0); }
        body.menu-open .sidebar-overlay { opacity: 1; pointer-events: auto; }
    </style>
</head>
<body data-page="collection-add">
<div id="sidebarOverlay" class="sidebar-overlay"></div>

<aside id="sidebar" class="sidebar" aria-hidden="true">
    <div class="sidebar-head">
        <h3>HoopAround</h3>
        <p>EagerUltras</p>
    </div>
    <nav class="sidebar-nav">
        <a href="/main.html" class="sidebar-link" data-nav="home" data-i18n="nav_home">Home</a>
        <a href="/user-profile.html" class="sidebar-link" data-nav="my-profile" data-i18n="nav_profile">My Profile</a>
        <a href="/countries.html" class="sidebar-link" data-nav="countries" data-i18n="nav_countries">Countries</a>
        <a href="/stadiums.html" class="sidebar-link" data-nav="stadiums" data-i18n="nav_stadiums">Stadiums</a>
        <a href="/teams.html" class="sidebar-link" data-nav="teams" data-i18n="nav_teams">Teams</a>
        <a href="/wishlist.html" class="sidebar-link" data-nav="wishlist" data-i18n="nav_wishlist">Wishlist</a>
        <a href="/collection.html" class="sidebar-link" data-nav="collection" data-i18n="nav_collection">My Collection</a>
        <a href="/collection-add.html" class="sidebar-link" data-nav="collection-add" data-i18n="nav_add_match">Add Match</a>
        <a href="/map.html" class="sidebar-link" data-nav="map" data-i18n="nav_map">Map</a>
        <a href="/chat.html" class="sidebar-link" data-nav="chat" data-i18n="nav_chat">Chat</a>
    </nav>
</aside>

<main class="page-shell">
    <header class="topbar">
        <div class="topbar-left">
            <button id="menuToggle" class="menu-btn" type="button" aria-label="Open menu" aria-expanded="false">
                <span></span><span></span><span></span>
            </button>
            <div>
                <p class="tiny">EagerUltras</p>
                <h1 data-i18n="collection_add_page_title">Add Match</h1>
            </div>
        </div>
        <div class="topbar-actions">
            <div class="language-switch">
                <button type="button" data-language-button="en" data-i18n="action_en">EN</button>
                <button type="button" data-language-button="tr" data-i18n="action_tr">TR</button>
            </div>
            <button id="logoutBtn" class="ghost" type="button" data-i18n="action_logout">Logout</button>
        </div>
    </header>

    <section class="card">
        <div class="section-head">
            <h3 data-i18n="collection_add_heading">Add a match to your collection</h3>
            <p data-i18n="collection_add_desc">Choose the stadium, teams, date, rating, and comment.</p>
        </div>
        <form id="matchForm" class="match-form">
            <label class="search-wrap">
                <span data-i18n="collection_add_stadium">Stadium</span>
                <input id="matchStadiumInput" class="search-input" type="text" data-i18n-placeholder="collection_add_stadium_placeholder" placeholder="Type to find a stadium" autocomplete="off" required />
                <div id="matchStadiumResults" class="search-results hidden"></div>
            </label>
            <label class="search-wrap">
                <span data-i18n="collection_add_home_team">Home team</span>
                <input id="matchHomeTeamInput" class="search-input" type="text" data-i18n-placeholder="collection_add_home_team_placeholder" placeholder="Type to choose the home team" autocomplete="off" required />
                <div id="matchHomeTeamResults" class="search-results hidden"></div>
            </label>
            <label class="search-wrap">
                <span data-i18n="collection_add_away_team">Away team</span>
                <input id="matchAwayTeamInput" class="search-input" type="text" data-i18n-placeholder="collection_add_away_team_placeholder" placeholder="Type to choose the away team" autocomplete="off" required />
                <div id="matchAwayTeamResults" class="search-results hidden"></div>
            </label>
            <label>
                <span data-i18n="collection_add_match_date">Match date</span>
                <input id="matchAt" type="date" required />
            </label>
            <label>
                <span data-i18n="collection_add_rating">Stadium rating (1-10)</span>
                <input id="matchRating" type="number" min="1" max="10" />
            </label>
            <label class="full-width">
                <span data-i18n="collection_add_comment">Comment</span>
                <textarea id="matchComment" rows="3" data-i18n-placeholder="collection_add_comment_placeholder" placeholder="Write about your match experience..."></textarea>
            </label>
            <button id="matchSubmitBtn" class="ghost" type="submit" data-i18n="collection_add_submit">Add match to collection</button>
        </form>
        <p id="matchFormInfo" class="stadium-card-meta"></p>
    </section>
</main>

<script src="/js/i18n.js"></script>
<script src="/js/layout.js"></script>
<script src="/js/collection-add.js"></script>
</body>
</html>
