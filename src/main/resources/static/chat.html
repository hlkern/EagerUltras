<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HoopAround | Chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/css/main.css" />
</head>
<body data-page="chat">
<div id="sidebarOverlay" class="sidebar-overlay"></div>

<aside id="sidebar" class="sidebar" aria-hidden="true">
    <div class="sidebar-head"><h3>HoopAround</h3><p>EagerUltras</p></div>
    <nav class="sidebar-nav">
        <a href="/main.html" class="sidebar-link" data-nav="home" data-i18n="nav_home">Home</a>
        <a href="/user-profile.html" class="sidebar-link" data-nav="my-profile" data-i18n="nav_profile">My Profile</a>
        <a href="/countries.html" class="sidebar-link" data-nav="countries" data-i18n="nav_countries">Countries</a>
        <a href="/stadiums.html" class="sidebar-link" data-nav="stadiums" data-i18n="nav_stadiums">Stadiums</a>
        <a href="/teams.html" class="sidebar-link" data-nav="teams" data-i18n="nav_teams">Teams</a>
        <a href="/wishlist.html" class="sidebar-link" data-nav="wishlist" data-i18n="nav_wishlist">Wishlist</a>
        <a href="/collection.html" class="sidebar-link" data-nav="collection" data-i18n="nav_collection">My Collection</a>
        <a href="/map.html" class="sidebar-link" data-nav="map" data-i18n="nav_map">Map</a>
        <a href="/chat.html" class="sidebar-link" data-nav="chat" data-i18n="nav_chat">Chat</a>
    </nav>
</aside>

<main class="page-shell">
    <header class="topbar">
        <div class="topbar-left">
            <button id="menuToggle" class="menu-btn" type="button" aria-label="Open menu" aria-expanded="false"><span></span><span></span><span></span></button>
            <div><p class="tiny">EagerUltras</p><h1>Chat</h1></div>
        </div>
        <div class="topbar-actions">
            <div class="language-switch">
                <button type="button" data-language-button="en" data-i18n="action_en">EN</button>
                <button type="button" data-language-button="tr" data-i18n="action_tr">TR</button>
            </div>
            <button id="logoutBtn" class="ghost" type="button" data-i18n="action_logout">Logout</button>
        </div>
    </header>

    <section class="card">
        <h3>Start a new chat</h3>
        <div class="chat-new-row">
            <div class="search-wrap">
                <input id="chatUserSearchInput" class="search-input" type="text" placeholder="Search username" autocomplete="off" />
                <div id="chatUserSearchResults" class="search-results hidden"></div>
            </div>
            <button id="chatStartBtn" class="ghost" type="button">Open chat</button>
        </div>
        <p id="chatInfo" class="stadium-card-meta"></p>
    </section>

    <section class="chat-layout">
        <article class="card">
            <h3>Previous chats</h3>
            <div id="chatSummaryList" class="chat-summary-list"></div>
        </article>

        <article class="card">
            <div class="chat-thread-head">
                <h3 id="chatThreadTitle">Select a chat</h3>
            </div>
            <div id="chatMessages" class="chat-messages"></div>
            <form id="chatSendForm" class="chat-send-form">
                <textarea id="chatMessageInput" rows="3" placeholder="Write a message..." required></textarea>
                <button id="chatSendBtn" class="ghost" type="submit">Send</button>
            </form>
        </article>
    </section>
</main>

<script src="/js/i18n.js"></script>
<script src="/js/layout.js"></script>
<script src="/js/chat.js"></script>
</body>
</html>
