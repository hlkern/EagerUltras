<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HoopAround | Countries</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/css/main.css" />
</head>
<body data-page="countries">
<div id="sidebarOverlay" class="sidebar-overlay"></div>

<aside id="sidebar" class="sidebar" aria-hidden="true">
    <div class="sidebar-head">
        <h3>HoopAround</h3>
        <p>Groundhoopers app</p>
    </div>
    <nav class="sidebar-nav">
        <a href="/main.html" class="sidebar-link" data-nav="home">Ana sayfa</a>
        <a href="/countries.html" class="sidebar-link" data-nav="countries">Ulkeler</a>
        <a href="/stadiums.html" class="sidebar-link" data-nav="stadiums">Stadlar</a>
        <a href="/teams.html" class="sidebar-link" data-nav="teams">Takimlar</a>
        <a href="/wishlist.html" class="sidebar-link" data-nav="wishlist">Wishlist</a>
        <a href="/collection.html" class="sidebar-link" data-nav="collection">Koleksiyonum</a>
        <a href="/chat.html" class="sidebar-link" data-nav="chat">Sohbet</a>
    </nav>
</aside>

<main class="page-shell">
    <header class="topbar">
        <div class="topbar-left">
            <button id="menuToggle" class="menu-btn" type="button" aria-label="Open menu" aria-expanded="false">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <div>
                <p class="tiny">GROUNDHOOPERS APP</p>
                <h1>Ulkeler</h1>
            </div>
        </div>
        <button id="logoutBtn" class="ghost" type="button">Logout</button>
    </header>

    <section class="country-card">
        <div class="section-head">
            <h3>Countries / Leagues</h3>
            <p>Select a country to see stadiums.</p>
        </div>
        <div id="countryList" class="country-list" aria-live="polite"></div>
    </section>

    <section id="stadiumDetail" class="detail-card hidden" aria-live="polite">
        <h3>Stadium details</h3>
        <div class="detail-grid">
            <div><span>ID</span><strong id="detailId">-</strong></div>
            <div><span>Name</span><strong id="detailName">-</strong></div>
            <div><span>Teams</span><strong id="detailTeam">-</strong></div>
            <div><span>City</span><strong id="detailCity">-</strong></div>
            <div><span>Capacity</span><strong id="detailCapacity">-</strong></div>
            <div><span>Country</span><strong id="detailCountry">-</strong></div>
            <div><span>Latitude</span><strong id="detailLatitude">-</strong></div>
            <div><span>Longitude</span><strong id="detailLongitude">-</strong></div>
        </div>
    </section>
</main>

<script src="/js/layout.js"></script>
<script src="/js/countries.js"></script>
</body>
</html>
